services:
  postgres:
    image: postgres:16-alpine
    container_name: cleansource-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: cleansource
      POSTGRES_PASSWORD: cleansource
      POSTGRES_DB: cleansource
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
