name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # prisma generate only needs the variable to exist; it never connects in CI.
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"
      JWT_SECRET: "ci-only"
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install (builds shared packages via postinstall)
        run: pnpm install --frozen-lockfile

      - name: Prisma generate
        run: pnpm --filter @cleansource/api prisma:generate

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build API
        run: pnpm --filter @cleansource/api build
