services:
  db:
    image: postgres:17
    container_name: cleansource-db
    environment:
      POSTGRES_USER: cleansource
      POSTGRES_PASSWORD: cleansource
      POSTGRES_DB: cleansource
    ports:
      # 5433 on the host: a native Postgres already occupies 5432 on this Mac
      - "5433:5432"
    volumes:
      - cleansource:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cleansource"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  cleansource:
